{% extends 'base.html' %}

{% block title %}Citas | Crear{% endblock %}
{% block content %}
<section class="section">
    <div class="container">
        <div class="box">
            <h1 class="title has-text-centered"> Registrar Cita</h1>
            <form action="{{ url_for('cita.create') }}" method="POST">
                <!-- Paciente -->
                <div class="field">
                    <label class="label"> Paciente</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select name="id_paciente" required>
                                <option value="">Seleccione un paciente</option>
                                {% for paciente in pacientes %}
                                <option value="{{ paciente.id_paciente }}"> {{ paciente.nombre }}  </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Médico -->
                <div class="field">
                    <label class="label"> Médico</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select name="id_medico" required>
                                <option value=""> Seleccione un médico</option>
                                {% for medico in medicos %}
                                <option value="{{ medico.id_medico }}">
                                {{ medico.nombre }}
                                </option>
                                {% endfor %}
                            </select>

                        </div>
                    </div>
                </div>

                <!-- Fecha -->
                <div class="field">
                    <label class="label">Fecha y Hora </label>
                    <div class="control">
                        <input class="input" type="datetime-local" name="fecha_hora" required>
                    </div>
                </div>

                <!-- Motivo -->
                <div class="field">
                    <label class="label">Motivo</label>
                    <div class="control">
                        <textarea class="textarea" name="motivo" placeholder="Motivo de la cita" required></textarea>
                    </div>
                </div>

                <!-- Estado -->
                <div class="field">
                    <label class="label"> Estado</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select name="estado" required>
                                <option value="Pendiente">Pendiente</option>
                                <option value="Confirmada">Confirmada</option>
                                <option value="Cancelada">Cancelada</option>
                                <option value="Atendida">Atendida</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Botones -->
                <div  class="field is-grouped is-justify-content-center mt-5">
                    <div class="control">
                        <button type="submit" class="button is-primary">
                            Registrar
                        </button>
                    </div>

                    <div class="control">
                        <a href="{{ url_for('cita.index') }}" class="button is-light">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>

    </div>
</section>

{% endblock %}
